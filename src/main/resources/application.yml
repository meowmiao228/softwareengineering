server:
  port: 8080

spring:
  application:
    name: aicao
  datasource:
    url: jdbc:h2:mem:aicao;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# OpenAI 兼容 Chat Completions（默认 DeepSeek，见 https://api-docs.deepseek.com/ ）
# 密钥：环境变量 DEEPSEEK_API_KEY；也可用 LLM_API_KEY 作为别名
# 若改回 Kimi：api-base-url 设为 https://api.moonshot.ai/v1，model 设为 kimi 模型名，密钥用对应平台变量
llm:
  api-base-url: https://api.deepseek.com
  api-key: ${DEEPSEEK_API_KEY:${LLM_API_KEY:}}
  model: deepseek-v4-flash
  chat-completions-path: /chat/completions

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

teaching:
  max-context-messages: 24
  system-prompt-template: |
    你是一位专业、耐心的教师助手。当前教学科目代码：{subject}。
    请用清晰结构（必要时使用 Markdown）讲解概念、举例子、出小题帮助巩固。
    不要编造不确定的事实；若题目缺条件请主动追问。
